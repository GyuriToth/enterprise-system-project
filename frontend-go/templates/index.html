<!DOCTYPE html>
<html>
<head>
    <title>Enterprise Transaction Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 card p-4">
                <h2 class="text-center mb-4">💳 New Transaction</h2>
                
                {{if .Status}}
                <div class="alert alert-info">{{.Status}}</div>
                {{end}}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">User</label>
                        <input type="text" name="user" class="form-control" placeholder="Pl. John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="number" step="0.01" name="amount" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Currency</label>
                        <select name="currency" class="form-select">
                            <option value="HUF">HUF</option>
                            <option value="EUR">EUR</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send to AWS</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="http://localhost:3000" target="_blank" class="btn btn-outline-secondary btn-sm">📊 Grafana Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
